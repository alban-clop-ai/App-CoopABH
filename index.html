
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <meta name="theme-color" content="#d1591e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Coop Airbus">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
</head>
<body>
<header>

</header>
<main>
    <div class="login-container">
        <div class="login-visual">
            <img src="logo-login.jpg" alt="Logo de connexion" class="login-logo">
        </div>
        <form id="login-form">
            <h2>Connexion</h2>

            <input type="email" id="username" name="username" placeholder="Email" autocomplete="email" required>

            <div class="password-container">
                <input type="password" id="password" name="password" placeholder="Mot de passe" autocomplete="current-password" required>
                <span class="toggle-password"
                    onmousedown="showPassword()"
                    onmouseup="hidePassword()"
                    onmouseleave="hidePassword()"
                    ontouchstart="showPassword()"
                    ontouchend="hidePassword()">
                    👁
                </span>
            </div>

            <p class="login-error" aria-live="polite"></p>
            <button type="submit">Se connecter</button>
        </form>
    </div>

    <script>
    const passwordInput = document.getElementById("password");

    function showPassword() {
        passwordInput.type = "text";
    }

    function hidePassword() {
        passwordInput.type = "password";
    }

    window.CoopAuth.initLoginPage();
    </script>
</main>

</body>
</html>
