<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion du stock</title>
    <link rel="icon" type="image/jpeg" href="logo-login.jpg">
    <link rel="stylesheet" href="Style1.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script src="app-ui.js"></script>
</head>
<body>
    <header class="page-header">
        <button
            type="button"
            class="menu-btn"
            id="menu-toggle"
            aria-expanded="false"
            aria-controls="side-menu"
            aria-label="Ouvrir le menu"
        >
            ☰
        </button>
        <div class="header-profile-name" id="header-profile-name">Utilisateur</div>
        <div class="header-date" id="current-date" aria-label="Date du jour"></div>
        <h1>Cooperative Airbus</h1>
        <a href="profil.html" class="profile-link">Mon profil</a>
    </header>

    <nav id="side-menu" class="side-menu" aria-hidden="true">
        <button type="button" class="close-btn" id="menu-close" aria-label="Fermer le menu">×</button>
        <a href="index1.html">Accueil</a>
        <a href="Vente.html">Vente</a>
        <a href="Stock.html">Stock</a>
        <a href="paramètre.html">Parametre</a>
        <button type="button" class="side-menu-logout" id="logout-button">Deconnexion</button>
    </nav>

    <main class="container stock-page stock-page-full">
        <section class="stock-main-panel" aria-labelledby="stock-title">
            <div class="section-heading">
                <h2 id="stock-title">Gestion du stock</h2>
                <p>Le rayon alimente la vente dans l'accueil. La reserve sert a recharger le rayon. L'ajout et la modification des articles se font maintenant dans Parametre.</p>
            </div>

            <div class="stock-summary" id="stock-summary"></div>
            <div class="stock-list" id="stock-list"></div>
        </section>
    </main>

    <script src="app-data.js"></script>
    <script>
        window.CoopAuth.requireAuth();
        window.CoopAuth.attachLogoutButton();
        window.CoopAppUi.renderHeaderProfileName();

        /* Elements de la page */
        const menuToggleButton = document.getElementById("menu-toggle");
        const menuCloseButton = document.getElementById("menu-close");
        const sideMenu = document.getElementById("side-menu");
        const sideMenuLinks = sideMenu.querySelectorAll("a");
        const currentDateElement = document.getElementById("current-date");
        const stockSummary = document.getElementById("stock-summary");
        const stockList = document.getElementById("stock-list");
        const categoryLabels = {};

        /* Evenements de base */
        menuToggleButton.addEventListener("click", toggleMenu);
        menuCloseButton.addEventListener("click", closeMenu);
        sideMenuLinks.forEach((link) => link.addEventListener("click", closeMenu));
        document.addEventListener("keydown", handleEscapeToCloseMenu);
        document.addEventListener("visibilitychange", handleVisibilityChange);
        window.CoopStockStore.subscribe(() => {
            renderStockPage();
        });

        initializePage();

        async function initializePage() {
            await window.CoopStockStore.init();
            updateCurrentDate();
            window.setInterval(updateCurrentDate, 60000);
            await renderStockPage();
        }

        /* Affichage complet de la page stock */
        async function renderStockPage() {
            await updateCategoryLabels();
            const products = await getVisibleStockProducts();
            renderSummary(products);
            renderProductCards(products);
        }

        async function updateCategoryLabels() {
            const categories = await window.CoopStockStore.getCategories();
            Object.keys(categoryLabels).forEach((key) => delete categoryLabels[key]);
            categories.forEach((category) => {
                categoryLabels[category.id] = category.label;
            });
        }

        /* Resume du stock */
        function renderSummary(products) {
            const totalShelf = products.reduce((sum, product) => sum + product.stockShelf, 0);
            const totalReserve = products.reduce((sum, product) => sum + product.stockReserve, 0);

            stockSummary.innerHTML = `
                <article class="summary-card">
                    <span class="summary-label">Articles references</span>
                    <strong>${products.length}</strong>
                </article>
                <article class="summary-card">
                    <span class="summary-label">Total rayon</span>
                    <strong>${totalShelf}</strong>
                </article>
                <article class="summary-card">
                    <span class="summary-label">Total reserve</span>
                    <strong>${totalReserve}</strong>
                </article>
            `;
        }

        /* Cartes des articles */
        function renderProductCards(products) {
            stockList.innerHTML = "";

            if (products.length === 0) {
                stockList.innerHTML = '<div class="empty-cart">Aucun article dans le stock.</div>';
                return;
            }

            products.forEach((product) => {
                stockList.appendChild(createProductCard(product));
            });

            stockList.querySelectorAll(".stock-action-btn").forEach((button) => {
                button.addEventListener("click", async (event) => {
                    await handleStockAction(event);
                });
            });
        }

        async function getVisibleStockProducts() {
            const products = await window.CoopStockStore.getProducts();
            return products.filter((product) => product.id !== "cafe-ramette");
        }

        function createProductCard(product) {
            const article = document.createElement("article");
            article.className = "stock-item-card";

            const imageMarkup = product.image
                ? `<img src="${product.image}" alt="${product.name}" class="stock-item-image">`
                : `<div class="stock-item-image stock-item-image-placeholder">Pas d'image</div>`;

            article.innerHTML = `
                <div class="stock-item-main">
                    ${imageMarkup}
                    <div class="stock-item-text">
                        <div class="stock-item-header">
                            <div>
                                <h3>${product.name}</h3>
                                <p>${categoryLabels[product.category] || product.category}</p>
                            </div>
                            <strong>${formatPrice(product.price)} EUR</strong>
                        </div>

                        <div class="stock-badges">
                            <span class="stock-badge shelf-badge">Rayon : ${product.stockShelf}</span>
                            <span class="stock-badge reserve-badge">Reserve : ${product.stockReserve}</span>
                        </div>
                    </div>
                </div>

                <div class="stock-item-actions">
                    <div class="stock-action-group">
                        <span>Transfert reserve vers rayon</span>
                        <div class="stock-inline-form">
                            <input type="number" min="1" value="1" class="stock-qty-input">
                            <button type="button" class="btn-vendu stock-action-btn" data-action="transfer" data-id="${product.id}">Transfert</button>
                        </div>
                    </div>

                    <div class="stock-action-group stock-action-group-right">
                        <span>Ajouter dans la reserve</span>
                        <div class="stock-inline-form">
                            <input type="number" min="1" value="1" class="stock-qty-input">
                            <button type="button" class="secondary-btn stock-action-btn" data-action="add-reserve" data-id="${product.id}">Ajouter</button>
                        </div>
                    </div>
                </div>

                <button type="button" class="remove-item-btn stock-delete-btn stock-action-btn" data-action="delete-product" data-id="${product.id}">
                    Supprimer
                </button>
            `;

            return article;
        }

        /* Actions sur une carte article */
        async function handleStockAction(event) {
            const button = event.currentTarget;
            const action = button.dataset.action;
            const productId = button.dataset.id;

            try {
                if (action === "transfer") {
                    const quantity = getActionQuantity(button);
                    await window.CoopStockStore.transferReserveToShelf(productId, quantity);
                }

                if (action === "add-reserve") {
                    const quantity = getActionQuantity(button);
                    await window.CoopStockStore.changeStock(productId, { stockReserveDelta: quantity });
                }

                if (action === "delete-product") {
                    await deleteProduct(productId);
                }

                await renderStockPage();
            } catch (error) {
                window.alert("Operation impossible. Verifie la quantite saisie et le stock disponible.");
            }
        }

        function getActionQuantity(button) {
            const input = button.parentElement.querySelector(".stock-qty-input");
            const quantity = Number(input.value);

            if (!Number.isInteger(quantity) || quantity <= 0) {
                throw new Error("Quantite invalide");
            }

            return quantity;
        }

        async function deleteProduct(productId) {
            const confirmed = window.confirm("Supprimer cet article du stock et de l'accueil ?");

            if (!confirmed) {
                return;
            }

            await window.CoopStockStore.deleteProduct(productId);
        }

        /* Ajout d'un nouvel article */
        /* Fonctions utiles */
        function formatPrice(value) {
            return Number(value).toFixed(2);
        }

        function updateCurrentDate() {
            currentDateElement.textContent = new Intl.DateTimeFormat("fr-FR", {
                weekday: "long",
                day: "numeric",
                month: "long"
            }).format(new Date());
        }

        async function handleVisibilityChange() {
            if (document.visibilityState === "visible") {
                updateCurrentDate();
                await renderStockPage();
            }
        }

        /* Menu lateral */
        function toggleMenu() {
            const isOpen = sideMenu.classList.toggle("is-open");
            sideMenu.setAttribute("aria-hidden", String(!isOpen));
            menuToggleButton.setAttribute("aria-expanded", String(isOpen));
        }

        function closeMenu() {
            sideMenu.classList.remove("is-open");
            sideMenu.setAttribute("aria-hidden", "true");
            menuToggleButton.setAttribute("aria-expanded", "false");
        }

        function handleEscapeToCloseMenu(event) {
            if (event.key === "Escape" && sideMenu.classList.contains("is-open")) {
                closeMenu();
            }
        }

    </script>
</body>
</html>
